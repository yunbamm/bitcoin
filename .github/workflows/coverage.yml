name: Jacoco Test Coverage Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code from the PR
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'adopt'
          java-version: '17'

      # Grant execute permission for gradlew in BitcoinAuto
      - name: Grant execute permission for gradlew
        run: chmod +x BitcoinAuto/gradlew

      # Run tests with Gradle in BitcoinAuto
      - name: Run tests with coverage
        working-directory: BitcoinAuto
        run: |
          ./gradlew clean test jacocoTestReport

      # Generate test coverage report
      - name: Test Coverage Report
        id: jacoco
        uses: madrapps/jacoco-report@v1.7.1
        with:
          title: Test Coverage Report
          paths: ${{ github.workspace }}/BitcoinAuto/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 80
